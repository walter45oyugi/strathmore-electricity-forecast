{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Electricity Forecast Dashboard{% endblock %}</title>
    <style>
        :root {
            --sidebar-red: #b91c1c;
            --sidebar-red-dark: #991b1b;
            --page-bg: #f7f9fc;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --accent-blue: #1d4ed8;
            --success: #15803d;
            --warning: #b45309;
            --danger: #b91c1c;
            --border: #e5e7eb;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--page-bg);
            color: var(--text-main);
        }

        .layout {
            min-height: 100vh;
            display: flex;
        }

        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, var(--sidebar-red) 0%, var(--sidebar-red-dark) 100%);
            color: white;
            padding: 28px 22px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            box-shadow: 4px 0 18px rgba(15, 23, 42, 0.12);
        }

        .sidebar-logo {
            width: 100%;
            max-width: 180px;
            align-self: center;
            background: white;
            border-radius: 14px;
            padding: 12px;
        }

        .sidebar h1 {
            margin: 0;
            font-size: 24px;
            line-height: 1.2;
        }

        .sidebar p {
            margin: 0;
            color: rgba(255, 255, 255, 0.88);
            line-height: 1.5;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar-nav a {
            color: white;
            text-decoration: none;
            padding: 12px 14px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.12);
        }

        .sidebar-nav .nav-static {
            padding: 12px 14px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.92);
        }

        .sidebar-nav a:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .content {
            flex: 1;
            padding: 32px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 22px;
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.08);
            margin-bottom: 24px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .button {
            background: var(--accent-blue);
            color: white;
            padding: 10px 14px;
            text-decoration: none;
            border-radius: 6px;
            border: 0;
            cursor: pointer;
            display: inline-block;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .metric {
            font-size: 24px;
            font-weight: bold;
            margin-top: 8px;
        }

        img {
            max-width: 100%;
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid var(--border);
            text-align: left;
        }

        a {
            color: var(--accent-blue);
            text-decoration: none;
        }

        p, li {
            line-height: 1.5;
        }

        .status-ok { color: var(--success); }
        .status-warn { color: var(--warning); }
        .error { color: var(--danger); white-space: pre-wrap; }
        .status-box { margin-top: 18px; padding: 12px; background: #eff6ff; border-radius: 8px; }
        .field { margin-bottom: 16px; }

        @media (max-width: 900px) {
            .layout {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }

            .content {
                padding: 20px;
            }

            .topbar {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <img class="sidebar-logo" src="{% static 'logo.png' %}" alt="Strathmore University logo">
            <div>
                <h1>Electricity Forecast Dashboard</h1>
                <p>Smart-meter analytics and demand forecasting workspace.</p>
            </div>
            <nav class="sidebar-nav">
                <a href="{% url 'overview' %}">Dashboard Overview</a>
                <a href="{% url 'forecast' %}">24-Hour Forecast</a>
                
            </nav>
        </aside>

        <main class="content">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
